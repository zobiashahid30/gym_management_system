<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="GymPro Login - Access Your Account">
    <title>Login - GymPro</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Theme Toggle -->
    <input type="checkbox" id="theme-toggle" class="theme-toggle-checkbox">
    
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="container">
            <div class="nav-wrapper">
                <div class="logo">
                    <a href="index.html">Gym<span>Pro</span></a>
                </div>
                <input type="checkbox" id="hamburger-menu" class="hamburger-checkbox">
                <label class="hamburger-toggle" for="hamburger-menu">
                    <span></span>
                    <span></span>
                    <span></span>
                </label>
                <ul class="nav-menu">
                    <li><a href="index.html" class="nav-link">Home</a></li>
                    <li><a href="about.html" class="nav-link">About</a></li>
                    <li><a href="trainers.html" class="nav-link">Trainers</a></li>
                    <li><a href="membership.html" class="nav-link">Membership</a></li>
                    <li><a href="contact.html" class="nav-link">Contact</a></li>
                    <li><a href="login.html" class="nav-link active">Login</a></li>
                    <li><a href="signup.html" class="btn-nav">Sign Up</a></li>
                </ul>
                <label for="theme-toggle" class="theme-toggle-btn">
                    <span class="sun-icon">☀️</span>
                    <span class="moon-icon">🌙</span>
                </label>
            </div>
        </div>
    </nav>

    <!-- Login Section with Glassmorphism -->
    <section class="auth-section">
        <div class="auth-background"></div>
        <div class="auth-container">
            <div class="auth-card glass">
                <div class="auth-header">
                    <h2>Welcome Back</h2>
                    <p>Login to access your account</p>
                </div>
                <form class="auth-form">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" placeholder="Enter your email" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" placeholder="Enter your password" required>
                    </div>
                    <div class="form-options">
                        <div class="checkbox-group">
                            <input type="checkbox" id="remember" name="remember">
                            <label for="remember">Remember me</label>
                        </div>
                        <a href="#" class="forgot-link">Forgot Password?</a>
                    </div>
                    <button type="submit" class="btn-auth">Login</button>
                </form>
                <div class="auth-divider">
                    <span>OR</span>
                </div>
                <div class="social-login">
                    <button class="social-btn google">
                        <span>Continue with Google</span>
                    </button>
                    <button class="social-btn facebook">
                        <span>Continue with Facebook</span>
                    </button>
                </div>
                <div class="auth-footer">
                    <p>Don't have an account? <a href="signup.html">Sign up here</a></p>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 GymPro. All rights reserved.</p>
            </div>
        </div>
    </footer>
</body>
</html>
