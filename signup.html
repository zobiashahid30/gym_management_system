<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="GymPro Sign Up - Create Your Account">
    <title>Sign Up - GymPro</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Theme Toggle -->
    <input type="checkbox" id="theme-toggle" class="theme-toggle-checkbox">
    
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="container">
            <div class="nav-wrapper">
                <div class="logo">
                    <a href="index.html">Gym<span>Pro</span></a>
                </div>
                <input type="checkbox" id="hamburger-menu" class="hamburger-checkbox">
                <label class="hamburger-toggle" for="hamburger-menu">
                    <span></span>
                    <span></span>
                    <span></span>
                </label>
                <ul class="nav-menu">
                    <li><a href="index.html" class="nav-link">Home</a></li>
                    <li><a href="about.html" class="nav-link">About</a></li>
                    <li><a href="trainers.html" class="nav-link">Trainers</a></li>
                    <li><a href="membership.html" class="nav-link">Membership</a></li>
                    <li><a href="contact.html" class="nav-link">Contact</a></li>
                    <li><a href="login.html" class="nav-link">Login</a></li>
                    <li><a href="signup.html" class="btn-nav active">Sign Up</a></li>
                </ul>
                <label for="theme-toggle" class="theme-toggle-btn">
                    <span class="sun-icon">☀️</span>
                    <span class="moon-icon">🌙</span>
                </label>
            </div>
        </div>
    </nav>

    <!-- Sign Up Section with Glassmorphism -->
    <section class="auth-section">
        <div class="auth-background"></div>
        <div class="auth-container">
            <div class="auth-card glass">
                <div class="auth-header">
                    <h2>Create Account</h2>
                    <p>Join GymPro and start your fitness journey</p>
                </div>
                <form class="auth-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="firstname">First Name</label>
                            <input type="text" id="firstname" name="firstname" placeholder="First name" required>
                        </div>
                        <div class="form-group">
                            <label for="lastname">Last Name</label>
                            <input type="text" id="lastname" name="lastname" placeholder="Last name" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" placeholder="Enter your email" required>
                    </div>
                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" name="phone" placeholder="Enter your phone number" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="password">Password</label>
                            <input type="password" id="password" name="password" placeholder="Create password" required>
                        </div>
                        <div class="form-group">
                            <label for="confirm-password">Confirm Password</label>
                            <input type="password" id="confirm-password" name="confirm-password" placeholder="Confirm password" required>
                        </div>
                    </div>
                    <div class="checkbox-group">
                        <input type="checkbox" id="terms" name="terms" required>
                        <label for="terms">I agree to the Terms & Conditions and Privacy Policy</label>
                    </div>
                    <button type="submit" class="btn-auth">Create Account</button>
                </form>
                <div class="auth-divider">
                    <span>OR</span>
                </div>
                <div class="social-login">
                    <button class="social-btn google">
                        <span>Sign up with Google</span>
                    </button>
                    <button class="social-btn facebook">
                        <span>Sign up with Facebook</span>
                    </button>
                </div>
                <div class="auth-footer">
                    <p>Already have an account? <a href="login.html">Login here</a></p>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 GymPro. All rights reserved.</p>
            </div>
        </div>
    </footer>
</body>
</html>
